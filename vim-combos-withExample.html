<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vim Combos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--bg4:#21262d;
  --t:#e6edf3;--t2:#8b949e;--t3:#484f58;
  --blue:#58a6ff;--green:#3fb950;--amber:#e3b341;--red:#f85149;--purple:#bc8cff;
  --border:#30363d;
  --mono:'Cascadia Code','Fira Code','JetBrains Mono','Courier New',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:var(--mono);font-size:13px;line-height:1.5;overflow:hidden}
button{font-family:var(--mono);cursor:pointer}
#app{display:flex;flex-direction:column;height:100vh}

/* ── header ── */
#hdr{display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;min-height:40px}
#hdr-title{font-size:13px;font-weight:600;letter-spacing:.03em;margin-right:4px}
.navbtn{padding:3px 10px;border-radius:3px;border:1px solid transparent;font-size:11px;background:transparent;color:var(--t2)}
.navbtn:hover{color:var(--t);background:var(--bg4)}
.navbtn.active{color:var(--t);border-color:var(--border);background:var(--bg3)}
.navdiv{width:1px;height:14px;background:var(--border);flex-shrink:0}
#hdr-right{margin-left:auto;display:flex;align-items:center;gap:7px}
.hpill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;border:1px solid var(--border);color:var(--t2)}
.hpill .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
#progbar{height:3px;background:var(--border);border-radius:2px;width:80px;display:inline-block;vertical-align:middle;overflow:hidden}
#progfill{height:100%;background:var(--green);transition:width .3s;border-radius:2px}
.hbtn{padding:3px 9px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--t2);font-size:11px}
.hbtn:hover{color:var(--t);border-color:var(--t2)}
.hbtn.ok{color:var(--green);border-color:#196932}

/* ── body ── */
#body{display:flex;flex:1;overflow:hidden}

/* ── sidebar ── */
#sb{width:188px;flex-shrink:0;overflow-y:auto;background:var(--bg2);border-right:1px solid var(--border);padding:6px 0}
.sh{padding:5px 10px 3px;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none}
.sh:hover{color:var(--t2)}
.sh .arr{font-size:8px;transition:transform .15s;display:inline-block}
.sh.open .arr{transform:rotate(90deg)}
.si{display:none}
.sh.open+.si{display:block}
.sitem{padding:3px 10px 3px 18px;font-size:11px;cursor:pointer;color:var(--t2);display:flex;align-items:center;gap:5px;border-left:2px solid transparent}
.sitem:hover{color:var(--t);background:var(--bg4)}
.sdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;background:var(--t3)}
.sdot.l{background:var(--green)}
.sdot.f{background:var(--amber)}

/* ── pages ── */
.page{display:none;flex:1;overflow-y:auto}
.page.active{display:flex;flex-direction:column}

/* ── reference page ── */
#pg-ref{padding:18px 22px}
#fbar{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.fbtn{padding:3px 11px;border-radius:20px;border:1px solid var(--border);font-size:11px;background:transparent;color:var(--t2);font-family:var(--mono)}
.fbtn:hover{color:var(--t);border-color:var(--t2)}
.fbtn.on{background:var(--t);color:var(--bg);border-color:var(--t)}
.stage-hdr{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin:0 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.stage-hdr em{color:var(--t2);font-style:normal;font-weight:400;margin-left:8px;letter-spacing:0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:11px;margin-bottom:32px}

/* ── cards ── */
.card{border-radius:7px;border:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;transition:border-color .15s,background .15s}
.card.learnt{border-color:#196932;background:#091a10}
.card.foreign{border-color:#7d3a0a;background:#1e0f04}
.card-top{padding:12px 13px 10px;display:flex;align-items:flex-start;gap:7px;border-bottom:1px solid var(--border)}
.card-keys{display:flex;flex-wrap:wrap;gap:4px;flex:1}
.kk{padding:3px 9px;border:1px solid var(--border);border-radius:4px;background:var(--bg4);font-size:13px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
.card.learnt .kk{border-color:#196932;background:rgba(63,185,80,.1);color:#7ee89a}
.card.foreign .kk{border-color:#7d3a0a;background:rgba(227,179,65,.1);color:#f0c060}
.mbadge{padding:2px 6px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.06em;white-space:nowrap;flex-shrink:0;margin-top:1px}
.mn{background:#162032;color:var(--blue)}
.mi{background:#102518;color:var(--green)}
.mv{background:#2d2008;color:var(--amber)}
.mc{background:#21142b;color:var(--purple)}
.card-body{padding:11px 13px 9px;flex:1}
.card-desc{font-size:13px;font-weight:600;color:var(--t);margin-bottom:10px;line-height:1.4}
.ba{display:grid;grid-template-columns:1fr 16px 1fr;gap:4px;align-items:center;margin-bottom:9px}
.ba-lbl{font-size:9px;color:var(--t3);letter-spacing:.07em;margin-bottom:2px}
.ba-buf{font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:5px 7px;white-space:pre;overflow-x:auto;line-height:1.55;min-height:24px}
.ba-arr{text-align:center;color:var(--t3);font-size:12px}
.cur{background:var(--blue);color:var(--bg);border-radius:2px;padding:0 1px}
.tip{font-size:11px;color:var(--t2);border-left:2px solid var(--border);padding:3px 8px;line-height:1.55;margin-bottom:9px}
.card.learnt .tip{border-left-color:#196932}
.card.foreign .tip{border-left-color:#7d3a0a}
.tryit{font-size:11px;background:var(--bg3);border-radius:3px;border:1px solid var(--border);padding:7px 9px;line-height:1.55;color:var(--t2)}
.tryit strong{color:var(--amber)}
.card-foot{padding:9px 13px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:7px}
.state-lbl{font-size:10px;font-weight:700;letter-spacing:.05em;min-width:50px}
.s-n{color:var(--t3)}.s-l{color:var(--green)}.s-f{color:var(--amber)}
.toggle{display:flex;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.tbtn{padding:4px 10px;font-size:10px;font-weight:700;background:transparent;border:none;color:var(--t3);transition:background .1s,color .1s;letter-spacing:.04em;border-right:1px solid var(--border)}
.tbtn:last-child{border-right:none}
.tbtn:hover{color:var(--t2);background:var(--bg4)}
.tbtn.on-n{background:var(--bg4);color:var(--t2)}
.tbtn.on-l{background:rgba(63,185,80,.2);color:var(--green)}
.tbtn.on-f{background:rgba(227,179,65,.2);color:var(--amber)}

/* ── practice page ── */
.prac-wrap{display:flex;flex:1;overflow:hidden;min-height:0}
.prac-left{width:340px;flex-shrink:0;overflow-y:auto;padding:20px 18px;border-right:1px solid var(--border)}
.prac-right{flex:1;overflow-y:auto;padding:20px 22px;min-width:0}
.prac-title{font-size:16px;font-weight:700;margin-bottom:4px}
.prac-sub{font-size:12px;color:var(--t2);margin-bottom:16px;line-height:1.5}
.ex-list{display:flex;flex-direction:column;gap:12px}
.ex{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:11px 13px}
.ex-num{font-size:10px;color:var(--t3);letter-spacing:.06em;margin-bottom:4px}
.ex-title{font-size:12px;font-weight:600;color:var(--t);margin-bottom:5px;line-height:1.4}
.ex-desc{font-size:11px;color:var(--t2);line-height:1.55;margin-bottom:8px}
.ex-cmds{display:flex;flex-direction:column;gap:4px}
.cmd-row{display:flex;align-items:center;gap:7px}
.cmd-lbl{font-size:10px;color:var(--t3);width:42px;flex-shrink:0}
.cmd-key{font-size:12px;font-weight:600;background:var(--bg4);border:1px solid var(--border);border-radius:3px;padding:2px 8px;color:var(--t);letter-spacing:.02em;white-space:nowrap}
.cmd-arrow{font-size:11px;color:var(--t3)}
.cmd-result{font-size:11px;color:var(--t2);font-style:italic}
/* practice buffer */
.buf-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.buf-label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.08em}
.buf-actions{display:flex;gap:6px}
.copy-btn{padding:3px 10px;font-size:11px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--t2);transition:color .1s,border-color .1s}
.copy-btn:hover{color:var(--t);border-color:var(--t2)}
.copy-btn.copied{color:var(--green);border-color:#196932}
.dl-btn{padding:3px 10px;font-size:11px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--t2)}
.dl-btn:hover{color:var(--t);border-color:var(--t2)}
.buf-block{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px 16px;font-size:12px;line-height:1.8;white-space:pre;overflow-x:auto;tab-size:4;color:var(--t)}
.buf-block .ln{color:var(--t3);user-select:none;display:inline-block;width:28px;text-align:right;margin-right:10px;font-size:11px}
.buf-note{margin-top:10px;font-size:11px;color:var(--t2);line-height:1.6;padding:8px 10px;background:var(--bg3);border-radius:4px;border:1px solid var(--border)}
.buf-note strong{color:var(--amber)}
/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--t3);border-radius:3px}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <span id="hdr-title">⌨ Vim Combos</span>
    <div class="navdiv"></div>
    <button class="navbtn active" onclick="goPage('ref',this)">Reference</button>
    <button class="navbtn" onclick="goPage('p-s1',this)">Survival</button>
    <button class="navbtn" onclick="goPage('p-s2',this)">Navigation</button>
    <button class="navbtn" onclick="goPage('p-s3',this)">Insert</button>
    <button class="navbtn" onclick="goPage('p-s4',this)">Operators</button>
    <button class="navbtn" onclick="goPage('p-s5',this)">Text Objects</button>
    <button class="navbtn" onclick="goPage('p-s6',this)">Visual</button>
    <button class="navbtn" onclick="goPage('p-s7',this)">Search</button>
    <button class="navbtn" onclick="goPage('p-s8',this)">Power</button>
    <div id="hdr-right">
      <span class="hpill"><span class="dot" style="background:var(--green)"></span><span id="cnt-l">0</span></span>
      <span class="hpill"><span class="dot" style="background:var(--amber)"></span><span id="cnt-f">0</span></span>
      <span class="hpill"><span class="dot" style="background:var(--t3)"></span><span id="cnt-n">0</span></span>
      <span id="progbar"><span id="progfill" style="width:0%"></span></span>
      <span id="progtxt" style="font-size:10px;color:var(--t2)">0/0</span>
      <button class="hbtn" id="save-btn" onclick="saveProgress()" title="Download progress as JSON">↓ save</button>
      <label class="hbtn" style="cursor:pointer" title="Load progress from JSON">↑ load<input type="file" accept=".json" style="display:none" onchange="loadProgress(event)"></label>
      <button class="hbtn" onclick="resetAll()">reset</button>
    </div>
  </div>
  <div id="body">
    <nav id="sb"></nav>
    <!-- pages -->
    <div id="pg-ref" class="page active">
      <div id="fbar">
        <button class="fbtn on" onclick="setFilter('all',this)">All</button>
        <button class="fbtn" onclick="setFilter('n',this)">Not yet</button>
        <button class="fbtn" onclick="setFilter('f',this)">Foreign</button>
        <button class="fbtn" onclick="setFilter('l',this)">Learnt</button>
      </div>
      <div id="cards"></div>
    </div>
    <!-- practice pages rendered by JS -->
  </div>
</div>
<script>
// ════════════════════════════════════════════
// CURRICULUM DATA
// ════════════════════════════════════════════
const STAGES=[
{id:'s1',title:'Survival',combos:[
  {id:'hjkl',keys:['h','j','k','l'],mode:'n',desc:'Navigate left/down/up/right',before:'hel|lo world',after:'hell|o world',tip:'Replace arrow keys permanently. 5j moves 5 lines down. Muscle memory takes ~1 week.',try:'Navigate to "DELETE" on the last line using j/k and h/l only — no arrow keys.'},
  {id:'i_esc',keys:['i','Esc'],mode:'n',desc:'Enter insert mode / return to normal',before:'|hello',after:'hel|lo  ← insert',tip:'Esc is the most important key. Ctrl+[ is identical and ergonomically superior.',try:'Press i, type a few characters, then Esc. Watch the mode label change.'},
  {id:'colon_cmds',keys:[':w',':q',':wq'],mode:'c',desc:'Save / quit / save-and-quit',before:'(unsaved)',after:'(written)',tip:':q! discards changes. :e! reloads from disk. All require Enter to execute.',try:'Press : to enter command mode. Type w and Enter. Then try :noh.'},
  {id:'x_del',keys:['x'],mode:'n',desc:'Delete character under cursor',before:'hell|xo world',after:'hell|o world',tip:'X deletes before cursor. 5x deletes five characters forward.',try:'Navigate to the spurious "x" in "hellxo" and press x to remove it.'},
  {id:'dd_p',keys:['dd','p'],mode:'n',desc:'Delete (cut) line / paste below',before:'keep\n|remove me\nkeep',after:'keep\n|keep',tip:'Content lands in the default register. p pastes below, P above. 3dd deletes three.',try:'Cursor on "DELETE THIS LINE". Press dd, move up, press p.'},
  {id:'u_redo',keys:['u','Ctrl+r'],mode:'n',desc:'Undo / redo',before:'(wrong state)',after:'(restored)',tip:'Vim maintains a full undo tree. u undoes; Ctrl+r redoes.',try:'Delete a character with x. Press u to undo. Press Ctrl+r to redo.'},
  {id:'yy',keys:['yy','p'],mode:'n',desc:'Yank (copy) current line / paste below',before:'|copy me\nnext',after:'copy me\n|copy me\nnext',tip:'p pastes below, P above. Line stays in the default register.',try:'Cursor on the greet function. Press yy to copy. Press G then p to paste at end.'},
]},
{id:'s2',title:'Navigation',combos:[
  {id:'wbe',keys:['w','b','e'],mode:'n',desc:'Next word / prev word / word end',before:'|hello world foo',after:'hello |world foo',tip:'W B E use whitespace-only as delimiter. 3w hops three words forward.',try:'Press w repeatedly to hop words. Use b to go back. Use e to land on ends.'},
  {id:'line_pos',keys:['0','^','$'],mode:'n',desc:'Column 0 / first non-blank / end of line',before:'    hell|o world',after:'    |hello world',tip:'^ is more useful than 0 in indented code. d$ deletes to end of line.',try:'Press ^ to reach first non-blank. Press $ to jump to end. Try 0.'},
  {id:'gg_G',keys:['gg','G'],mode:'n',desc:'Jump to first line / last line',before:'(anywhere)',after:'|first line',tip:'5gg jumps to line 5. dG deletes from cursor to end of file.',try:'Press G to reach last line. Press gg to return. Try 4gg.'},
  {id:'percent',keys:['%'],mode:'n',desc:'Jump to matching bracket',before:'greet(|name) {',after:'greet(name|) {',tip:'Works with () [] {}. One keypress for deeply nested traversal.',try:'Place cursor on any ( or { in code. Press % to jump to its pair.'},
  {id:'fx',keys:['fx','Fx'],mode:'n',desc:'Find character forward/backward on line',before:'|function greet(name)',after:'function greet(name|)',tip:'; repeats the last find in same direction. , reverses it.',try:'On function line, press f( to jump to paren. Press ; to find the next.'},
  {id:'tx',keys:['tx','Tx'],mode:'n',desc:'Move till (one before) character on line',before:'|function greet(name)',after:'function greet(name|)',tip:'dt; deletes till semicolon, ct( changes till paren.',try:'Press t) to land just before closing paren. Try ct{ to change till brace.'},
  {id:'para',keys:['{','}'],mode:'n',desc:'Jump to prev/next blank-line boundary',before:'|block1\n\nblock2',after:'block1\n|\nblock2',tip:'d} deletes to end of current block.',try:'Press } to jump over blank line to next function block. Use { to go back.'},
]},
{id:'s3',title:'Insert Mastery',combos:[
  {id:'a_append',keys:['a'],mode:'n',desc:'Append — insert after cursor character',before:'hel|lo',after:'hell|o',tip:'i goes before; a goes after the character. Matters most at line ends.',try:'Navigate to end of a word. Press a to append text immediately after.'},
  {id:'IA',keys:['I','A'],mode:'n',desc:'Insert at first non-blank / append at line end',before:'    hell|o world',after:'    |  ← insert',tip:'I = ^i. A = $a. A is one of the most frequently used commands.',try:'Press A to jump to end of line and enter insert. Try I for start.'},
  {id:'oO',keys:['o','O'],mode:'n',desc:'Open new line below/above, enter insert',before:'|line 1\nline 2',after:'line 1\n|  ← new\nline 2',tip:'Much faster than End → Enter. Correct indentation preserved.',try:'Press o to open new line below. Press Esc then O to open one above.'},
  {id:'cw',keys:['cw'],mode:'n',desc:'Change word — delete forward and enter insert',before:'hello |world foo',after:'hello |  foo',tip:'cW changes WORD. ce changes to word end. One of the most-used combos.',try:'Navigate cursor into "world". Press cw to delete it and type a replacement.'},
  {id:'cc_line',keys:['cc'],mode:'n',desc:'Change entire line — wipe and enter insert',before:'|old content here',after:'|  ← insert',tip:'Cursor stays at correct indentation. Faster than dd then i.',try:'Press cc on any line to clear it and type replacement content.'},
  {id:'ctrl_w_ins',keys:['Ctrl+w'],mode:'i',desc:'Delete previous word in insert mode',before:'hello wor|  ← insert',after:'hello |  ← insert',tip:'Works in insert mode only. Useful for correcting a mistyped word.',try:'Press i, type several words, then Ctrl+w to delete the last typed word.'},
]},
{id:'s4',title:'Operators + Motions',combos:[
  {id:'dmotion',keys:['dw','db','d$'],mode:'n',desc:'Delete: next word / prev word / to line end',before:'|hello world foo',after:'|world foo',tip:'The grammar: operator + motion = act on that range. d3w deletes three words.',try:'Press dw to delete "hello". Press db to delete word before cursor. Try d$.'},
  {id:'yw',keys:['yw','y$'],mode:'n',desc:'Yank word / yank to end of line',before:'|hello world',after:'|hello world  (reg: hello)',tip:'y accepts all motions: y$ to end, yG to file end, y3w for three words.',try:'Press yw on a word. Navigate elsewhere. Press p to paste it.'},
  {id:'dot',keys:['.'],mode:'n',desc:'Repeat last change at current position',before:'|word word word',after:'word |word word',tip:'The most powerful primitive in Vim. Works after any change. Combine with n or f.',try:'Delete a word with dw. Move to another word. Press . to delete it too.'},
  {id:'DC',keys:['D','C'],mode:'n',desc:'Delete/change from cursor to end of line',before:'keep |delete this',after:'keep|',tip:'D = d$. C = c$. C enters insert mode.',try:'Press D to delete from cursor to end. Undo, then press C to change instead.'},
  {id:'indent_ops',keys:['>>','<<'],mode:'n',desc:'Indent / dedent current line',before:'|code here',after:'    |code here',tip:'In visual mode: V then > indents an entire selected range.',try:'Press >> to indent. Press << to dedent. Try V j > in visual mode.'},
  {id:'tilde',keys:['~'],mode:'n',desc:'Toggle case of character under cursor',before:'hello |World',after:'hello |world',tip:'g~ + motion toggles a range. gU uppercases, gu lowercases.',try:'Navigate to a letter and press ~ to flip case. Press . to repeat.'},
]},
{id:'s5',title:'Text Objects',combos:[
  {id:'iw_aw',keys:['diw','daw'],mode:'n',desc:'Delete inner word / around word (+space)',before:'hello |world foo',after:'hello | foo',tip:'"inner" excludes space. "around" removes content + adjacent space.',try:'On "world": try diw (space remains) then undo, then daw (space removed).'},
  {id:'ci_quote',keys:['ci"',"ci'"],mode:'n',desc:'Change inside double/single quotes',before:'return "|hello" + name',after:'return "|"  ← insert',tip:'Works with any pair. Cursor may be anywhere inside the pair.',try:'Put cursor inside quoted string. Press ci" and type a new value.'},
  {id:'da_quote',keys:['da"'],mode:'n',desc:'Delete around quotes — removes delimiters too',before:'say "|hello"',after:'say |',tip:'"around" for pairs always includes the delimiter characters.',try:'Press da" to delete quoted string including both quote marks.'},
  {id:'ci_paren',keys:['ci(','da('],mode:'n',desc:'Change inside / delete around parentheses',before:'greet(|"Alice")',after:'greet(|)  ← insert',tip:'Also ci) or cib. Works across multiple lines.',try:'Cursor inside function-call parens. Press ci( to replace all arguments.'},
  {id:'ci_brace',keys:['ci{','da{'],mode:'n',desc:'Change inside / delete around curly braces',before:'if (x) {\n  |code\n}',after:'if (x) {\n  |\n}  ← insert',tip:'Also ci} or ciB. Essential for rewriting function bodies.',try:'Cursor inside braces. Press ci{ to clear body and retype.'},
  {id:'yip',keys:['yip','yap'],mode:'n',desc:'Yank inner / around paragraph',before:'\n|function...\n\n',after:'\n|function...  (yanked)',tip:'yap includes surrounding blank lines. dip, cip also available.',try:'Cursor in first function. Press yip to copy it. Press G p to paste.'},
]},
{id:'s6',title:'Visual Mode',combos:[
  {id:'v_char',keys:['v'],mode:'n',desc:'Enter character-wise visual mode',before:'|hello world',after:'[h]  ← extend with motions',tip:'Navigate to extend, then apply operator: d y c > < = ~',try:'Press v, then w to select words. Press d to delete or y to yank.'},
  {id:'V_line',keys:['V'],mode:'n',desc:'Enter line-wise visual mode',before:'|function greet...',after:'[function greet...]  ← selected',tip:'Selects entire lines. Extend with j/k.',try:'Press V, extend with j, then y to copy all selected lines.'},
  {id:'ctrl_v',keys:['Ctrl+v'],mode:'n',desc:'Enter block (column) visual mode',before:'|item1  val1\nitem2  val2',after:'[i]tem1\n[i]tem2  ← block',tip:'I then type inserts on every line simultaneously.',try:'Press Ctrl+v, extend with j, then I to insert text on every line.'},
  {id:'v_o',keys:['o'],mode:'v',desc:'Move cursor to other end of selection',before:'hel[lo wo|r]ld',after:'hel|[lo wor]ld',tip:'Adjust the start boundary without losing the selection.',try:'Make a visual selection, then press o to swap to the other end.'},

function authenticate(user, token) {
    if (!user || !token) return false;
    let result = db.query("SELECT * FROM users WHERE id = " + user.id);
    if (result.length === 0) return false;
    let stored = result[0].token;
    return stored === token;
}

function authorise(user, resource, permission) {
    if (!user) return false;
    let roles = user.roles || [];
    return roles.some(role => role.permissions.includes(permission));
}

function fetchUser(id) {
    return db.query("SELECT * FROM users WHERE id = " + id);

const STORE='vcs4';
let states={};
try{const d=localStorage.getItem(STORE);if(d)states=JSON.parse(d);}catch(e){}
let filterState='all';
let currentPage='ref';

const ALL=STAGES.flatMap(s=>s.combos.map(c=>({...c,stageId:s.id})));

function gs(id){return states[id]||'n';}
function ss(id,s){
  states[id]=s;
  try{localStorage.setItem(STORE,JSON.stringify(states));}catch(e){}
  syncCounts();syncSidebar();
}
function setStateDirect(id,s){ss(id,s);syncCard(id);}

// ── counts ──
function syncCounts(){
  const tot=ALL.length;let l=0,f=0,n=0;
  ALL.forEach(c=>{const s=gs(c.id);if(s==='l')l++;else if(s==='f')f++;else n++;});
  document.getElementById('cnt-l').textContent=l;
  document.getElementById('cnt-f').textContent=f;
  document.getElementById('cnt-n').textContent=n;
  document.getElementById('progtxt').textContent=l+'/'+tot;
  document.getElementById('progfill').style.width=Math.round(l/tot*100)+'%';
}

// ── save / load ──
function saveProgress(){
  const data=JSON.stringify({version:1,states},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='vim-progress.json';
  a.click();
  URL.revokeObjectURL(a.href);
  const btn=document.getElementById('save-btn');
  btn.textContent='✓ saved';btn.classList.add('ok');
  setTimeout(()=>{btn.textContent='↓ save';btn.classList.remove('ok');},2000);
}
function loadProgress(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.states&&typeof d.states==='object'){
        states=d.states;
        localStorage.setItem(STORE,JSON.stringify(states));
        ALL.forEach(c=>syncCard(c.id));
        syncCounts();syncSidebar();
        alert('Progress loaded — '+Object.keys(states).length+' entries restored.');
      } else {alert('Unrecognised file format.');}
    }catch(err){alert('Could not parse file: '+err.message);}
  };
  reader.readAsText(file);
  e.target.value='';
}
function resetAll(){
  if(!confirm('Reset all states to "not yet"?'))return;
  states={};try{localStorage.removeItem(STORE);}catch(e){}
  ALL.forEach(c=>syncCard(c.id,true));
  syncCounts();syncSidebar();
}

// ── filter ──
function setFilter(f,btn){
  filterState=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('on',b===btn));
  applyFilter();
}
function applyFilter(){
  document.querySelectorAll('.card').forEach(card=>{
    const s=gs(card.dataset.id);
    card.style.display=(filterState==='all'||s===filterState)?'':'none';
  });
  document.querySelectorAll('[data-stg]').forEach(sec=>{
    const any=[...sec.querySelectorAll('.card')].some(c=>c.style.display!=='none');
    sec.style.display=any?'':'none';
  });
}

// ── navigation ──
function goPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('active'));
  const pg=document.getElementById('pg-'+id);
  if(pg){pg.classList.add('active');}
  if(btn){btn.classList.add('active');}
  currentPage=id;
  location.hash=id;
}

// ── sidebar ──
function syncSidebar(){
  const sb=document.getElementById('sb');
  let h='';
  STAGES.forEach(st=>{
    h+=`<div class="sh open" onclick="this.classList.toggle('open');this.nextElementSibling.style.display=this.classList.contains('open')?'block':'none'">`;
    h+=`<span class="arr">▶</span>${esc(st.title)}`;
    h+='</div><div class="si" style="display:block">';
    st.combos.forEach(c=>{
      const s=gs(c.id);
      h+=`<div class="sitem" onclick="goCardPage('${c.id}')">`;
      h+=`<span class="sdot${s==='l'?' l':s==='f'?' f':''}"></span>`;
      h+=`<span style="font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.keys.join(' '))}</span>`;
      h+='</div>';
    });
    h+='</div>';
  });
  sb.innerHTML=h;
}
function goCardPage(id){
  // switch to reference page and scroll to card
  const refNavBtn=[...document.querySelectorAll('.navbtn')].find(b=>b.textContent==='Reference');
  goPage('ref',refNavBtn);
  setTimeout(()=>{
    const el=document.getElementById('c-'+id);
    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  },60);
}

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function modeClass(m){return m==='n'?'mn':m==='v'?'mv':m==='i'?'mi':'mc';}
function modeName(m){return m==='n'?'NORMAL':m==='v'?'VISUAL':m==='i'?'INSERT':'COMMAND';}
function stateLabel(s){return s==='l'?'LEARNT':s==='f'?'FOREIGN':'NOT YET';}
function stateClass(s){return 'state-lbl s-'+s;}
function tbtnClass(cur,btn){return 'tbtn'+(cur===btn?' on-'+cur:'');}
function cursorify(str){
  const i=str.indexOf('|');if(i<0)return esc(str);
  const ch=str[i+1]||' ';
  return esc(str.slice(0,i))+'<span class="cur">'+esc(ch)+'</span>'+esc(str.slice(i+2));
}

// ════════════════════════════════════════════
// REFERENCE CARDS
// ════════════════════════════════════════════
function makeCard(c){
  const s=gs(c.id);
  return `<div class="card${s==='l'?' learnt':s==='f'?' foreign':''}" id="c-${c.id}" data-id="${c.id}">
  <div class="card-top">
    <div class="card-keys">${c.keys.map(k=>`<span class="kk">${esc(k)}</span>`).join('')}</div>
    <span class="mbadge ${modeClass(c.mode)}">${modeName(c.mode)}</span>
  </div>
  <div class="card-body">
    <div class="card-desc">${esc(c.desc)}</div>
    <div class="ba">
      <div><div class="ba-lbl">BEFORE</div><div class="ba-buf">${cursorify(c.before)}</div></div>
      <div class="ba-arr">→</div>
      <div><div class="ba-lbl">AFTER</div><div class="ba-buf">${cursorify(c.after)}</div></div>
    </div>
    ${c.tip?`<div class="tip">${esc(c.tip)}</div>`:''}
    ${c.try?`<div class="tryit"><strong>Try it →</strong> ${esc(c.try)}</div>`:''}
  </div>
  <div class="card-foot">
    <span class="${stateClass(s)}">${stateLabel(s)}</span>
    <div class="toggle">
      <button class="${tbtnClass(s,'n')}" data-s="n" onclick="setStateDirect('${c.id}','n')">– NOT YET</button>
      <button class="${tbtnClass(s,'l')}" data-s="l" onclick="setStateDirect('${c.id}','l')">✓ LEARNT</button>
      <button class="${tbtnClass(s,'f')}" data-s="f" onclick="setStateDirect('${c.id}','f')">? FOREIGN</button>
    </div>
  </div>
</div>`;
}
function syncCard(id,forceReset){
  const el=document.getElementById('c-'+id);
  if(!el)return;
  if(forceReset)states[id]='n';
  const s=gs(id);
  el.className='card'+(s==='l'?' learnt':s==='f'?' foreign':'');
  el.querySelector('.state-lbl').className=stateClass(s);
  el.querySelector('.state-lbl').textContent=stateLabel(s);
  el.querySelectorAll('.tbtn').forEach(b=>{b.className=tbtnClass(s,b.dataset.s);});
  if(filterState!=='all'&&s!==filterState)el.style.display='none';
  else el.style.display='';
}
function renderCards(){
  let h='';
  STAGES.forEach(st=>{
    h+=`<div data-stg="${st.id}">`;
    h+=`<div class="stage-hdr">${esc(st.title)}<em>${st.combos.length} combos</em></div>`;
    h+='<div class="grid">';
    st.combos.forEach(c=>{h+=makeCard(c);});
    h+='</div></div>';
  });
  document.getElementById('cards').innerHTML=h;
  applyFilter();
}

// ════════════════════════════════════════════
// PRACTICE PAGES
// ════════════════════════════════════════════
function makePracticePage(stageId){
  const stage=STAGES.find(s=>s.id===stageId);
  const pdata=PRACTICE[stageId];
  if(!stage||!pdata)return;

  const pgEl=document.createElement('div');
  pgEl.id='pg-p-'+stageId;
  pgEl.className='page';

  const lines=pdata.buf.split('\n');
  const numberedBuf=lines.map((ln,i)=>`<span class="ln">${i+1}</span>${esc(ln)}`).join('\n');

  const exHtml=pdata.exercises.map(ex=>{
    const cmdRows=ex.cmds.map(c=>`<div class="cmd-row">
      <span class="cmd-key">${esc(c.k)}</span>
      <span class="cmd-arrow">→</span>
      <span class="cmd-result">${esc(c.r)}</span>
    </div>`).join('');
    return `<div class="ex">
      <div class="ex-num">EXERCISE ${ex.num}</div>
      <div class="ex-title">${esc(ex.title)}</div>
      <div class="ex-desc">${esc(ex.desc)}</div>
      <div class="ex-cmds">${cmdRows}</div>
    </div>`;
  }).join('');

  pgEl.innerHTML=`<div class="prac-wrap">
  <div class="prac-left">
    <div class="prac-title">${esc(stage.title)}</div>
    <div class="prac-sub">Work through these exercises inside your own Vim instance using the practice buffer on the right.</div>
    <div class="ex-list">${exHtml}</div>
  </div>
  <div class="prac-right">
    <div class="buf-hdr">
      <span class="buf-label">PRACTICE BUFFER — ${esc(stage.title.toUpperCase())}</span>
      <div class="buf-actions">
        <button class="copy-btn" id="copy-${stageId}" onclick="copyBuf('${stageId}')">copy all</button>
        <button class="dl-btn" onclick="dlBuf('${stageId}')">↓ download .txt</button>
      </div>
    </div>
    <pre class="buf-block" id="buf-${stageId}">${numberedBuf}</pre>
    <div class="buf-note"><strong>How to use:</strong> Click "copy all" or "↓ download .txt" to get the buffer text. Open a terminal and run <span class="cmd-key" style="display:inline;font-size:11px">vim ${stage.title.toLowerCase().replace(/\s+/,'-')}.txt</span> then paste, or save and open the downloaded file directly. Work through each exercise in order.</div>
  </div>
</div>`;

  document.getElementById('body').appendChild(pgEl);
}

const bufTexts={};
STAGES.forEach(st=>{if(PRACTICE[st.id])bufTexts[st.id]=PRACTICE[st.id].buf;});

function copyBuf(sid){
  const txt=bufTexts[sid];if(!txt)return;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.getElementById('copy-'+sid);
    if(btn){btn.textContent='✓ copied';btn.classList.add('copied');setTimeout(()=>{btn.textContent='copy all';btn.classList.remove('copied');},1800);}
  }).catch(()=>{
    // fallback
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
  });
}
function dlBuf(sid){
  const stage=STAGES.find(s=>s.id===sid);
  const txt=bufTexts[sid];if(!txt)return;
  const blob=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(stage?stage.title.toLowerCase().replace(/\s+/g,'-'):'practice')+'.txt';
  a.click();URL.revokeObjectURL(a.href);
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
renderCards();
STAGES.forEach(st=>{if(PRACTICE[st.id])makePracticePage(st.id);});
syncSidebar();
syncCounts();

// restore page from hash
const hash=(location.hash||'').replace('#','');
if(hash){
  const btn=[...document.querySelectorAll('.navbtn')].find(b=>{
    const pageId=b.getAttribute('onclick').match(/goPage\('([^']+)'/)?.[1];
    return pageId===hash||'p-'+hash===pageId;
  });
  if(btn)btn.click();
}
</script>
